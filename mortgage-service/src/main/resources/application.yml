spring:
  application:
    name: mortgage-service

  profiles:
    active: dev   # override at runtime: -Dspring.profiles.active=prod

  jpa:
    open-in-view: false   # IMPORTANT: disables OSIV — prevents lazy loading silently
                          # firing extra queries outside of a transaction boundary
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true  # adds /* CustomerRepository#findByStatus */ style comments in SQL logs

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: mortgage-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

# ─── JWT ───────────────────────────────────────────────────────────────────────
jwt:
  secret: refer-docs-for-best-practices   # In production, use a secure, random secret and store it safely
  expiration: 86400000   # 24 hours in milliseconds